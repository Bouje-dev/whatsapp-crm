<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Check your email — Waselytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg-dark: #030014; --primary: #7c3aed; --text-main: #fff; --text-muted: #94a3b8; --border: rgba(255,255,255,0.08); }
    body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .box { width: 100%; max-width: 440px; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 48px 40px; text-align: center; }
    .brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; }
    .brand-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; margin: 0 0 12px; }
    p { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin: 0 0 24px; }
    a { color: var(--primary); font-weight: 600; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <div class="brand"><div class="brand-icon">W</div> Waselytics</div>
    <h1>Check your email</h1>
    <p>If an account exists for that address, we’ve sent a link to reset your password. The link expires after a while for security.</p>
    <p><a href="{% url 'login' %}">← Back to sign in</a></p>
  </div>
</body>
</html>
