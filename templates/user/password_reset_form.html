<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot password — Waselytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #030014;
      --primary: #7c3aed;
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --danger: rgba(239, 68, 68, 0.15);
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .box { width: 100%; max-width: 440px; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 48px 40px; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5); }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; }
    .brand-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 24px; margin: 0 0 10px; letter-spacing: -0.02em; }
    p.sub { color: var(--text-muted); font-size: 14px; margin: 0 0 24px; line-height: 1.5; }
    label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
    input[type="email"], .email-input { width: 100%; padding: 14px 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 15px; }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1); }
    .btn { width: 100%; padding: 14px; margin-top: 20px; background: linear-gradient(135deg, var(--primary), #4f46e5); border: none; border-radius: 12px; color: white; font-weight: 600; font-size: 16px; cursor: pointer; }
    .btn:hover { filter: brightness(1.05); }
    .back { margin-top: 24px; text-align: center; font-size: 14px; }
    .back a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .back a:hover { text-decoration: underline; }
    .error { background: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
    ul.errorlist { margin: 0; padding-left: 18px; color: #fca5a5; font-size: 13px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="brand"><div class="brand-icon">W</div> Waselytics</div>
    <h1>Forgot password?</h1>
    <p class="sub">Enter the email you use for your account. We’ll send you a link to set a new password.</p>
    <form method="post" action="{% url 'password_reset' %}">
      {% csrf_token %}
      {% if form.email.errors %}
        <div class="error">{{ form.email.errors }}</div>
      {% endif %}
      {% if form.non_field_errors %}
        <div class="error">{{ form.non_field_errors }}</div>
      {% endif %}
      <label for="id_email">Email</label>
      <input type="email" name="email" id="id_email" required autocomplete="email" placeholder="name@company.com"
        value="{{ form.email.value|default:'' }}"
        class="email-input">
      <button type="submit" class="btn">Send reset link</button>
    </form>
    <div class="back"><a href="{% url 'login' %}">← Back to sign in</a></div>
  </div>
</body>
</html>
